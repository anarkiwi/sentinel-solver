name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt black pylint pytest pytest-xdist
      - run: black --check sentinel driver conftest.py
      - run: pylint --rcfile=.pylintrc sentinel driver conftest.py
      - run: pytest -n auto
